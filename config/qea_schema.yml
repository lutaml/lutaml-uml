# Transformation mappings for EA to UML conversion
transformations:
  # EA Object Type to UML Model mappings
  object_types:
    Class: Lutaml::Uml::Class
    Interface: Lutaml::Uml::Class  # With interface stereotype
    Enumeration: Lutaml::Uml::Enum
    DataType: Lutaml::Uml::DataType
    Package: Lutaml::Uml::Package
    Component: Lutaml::Uml::Class  # With component stereotype
    Node: Lutaml::Uml::Class
    Actor: Lutaml::Uml::Actor
    UseCase: Lutaml::Uml::Class

  # EA Connector Type to UML Model mappings
  connector_types:
    Association: Lutaml::Uml::Association
    Generalization: Lutaml::Uml::Generalization
    Aggregation: Lutaml::Uml::Association  # With aggregation property
    Composition: Lutaml::Uml::Association  # With composition property
    Dependency: Lutaml::Uml::Dependency
    Realization: Lutaml::Uml::Realization
    Abstraction: Lutaml::Uml::Abstraction

  # Visibility mapping from EA to UML
  visibility_mapping:
    Public: public
    Private: private
    Protected: protected
    Package: package

  # Cardinality patterns
  cardinality_patterns:
    "0..1": { min: "0", max: "1" }
    "1": { min: "1", max: "1" }
    "0..*": { min: "0", max: "*" }
    "1..*": { min: "1", max: "*" }
    "*": { min: "0", max: "*" }

  # Transformer class mappings
  transformers:
    class: Lutaml::Qea::Factory::ClassTransformer
    attribute: Lutaml::Qea::Factory::AttributeTransformer
    operation: Lutaml::Qea::Factory::OperationTransformer
    association: Lutaml::Qea::Factory::AssociationTransformer
    generalization: Lutaml::Qea::Factory::GeneralizationTransformer
    package: Lutaml::Qea::Factory::PackageTransformer
    diagram: Lutaml::Qea::Factory::DiagramTransformer
    constraint: Lutaml::Qea::Factory::ConstraintTransformer
    tagged_value: Lutaml::Qea::Factory::TaggedValueTransformer
    object_property: Lutaml::Qea::Factory::ObjectPropertyTransformer
    attribute_tag: Lutaml::Qea::Factory::AttributeTagTransformer