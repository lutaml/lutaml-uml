# QEA Database Schema Configuration
# This file defines the mapping between Enterprise Architect database tables
# and their corresponding model classes for LutaML QEA parser

# Metadata
version: "1.0"
description: "Enterprise Architect QEA database schema configuration"
last_updated: "2025-10-30"
phase: "Phase 4 - EA to UML Transformation Layer"

# Model class mappings
model_classes:
  t_object: Lutaml::Qea::Models::EaObject
  t_attribute: Lutaml::Qea::Models::EaAttribute
  t_operation: Lutaml::Qea::Models::EaOperation
  t_operationparams: Lutaml::Qea::Models::EaOperationParam
  t_connector: Lutaml::Qea::Models::EaConnector
  t_package: Lutaml::Qea::Models::EaPackage
  t_diagram: Lutaml::Qea::Models::EaDiagram
  t_diagramobjects: Lutaml::Qea::Models::EaDiagramObject
  t_diagramlinks: Lutaml::Qea::Models::EaDiagramLink
  t_objectconstraint: Lutaml::Qea::Models::EaObjectConstraint
  t_taggedvalue: Lutaml::Qea::Models::EaTaggedValue
  t_objectproperties: Lutaml::Qea::Models::EaObjectProperty
  t_attributetag: Lutaml::Qea::Models::EaAttributeTag
  t_xref: Lutaml::Qea::Models::EaXref
  t_document: Lutaml::Qea::Models::EaDocument
  t_script: Lutaml::Qea::Models::EaScript
  t_stereotypes: Lutaml::Qea::Models::EaStereotype
  t_datatypes: Lutaml::Qea::Models::EaDatatype
  t_constrainttypes: Lutaml::Qea::Models::EaConstraintType
  t_connectortypes: Lutaml::Qea::Models::EaConnectorType
  t_diagramtypes: Lutaml::Qea::Models::EaDiagramType
  t_objecttypes: Lutaml::Qea::Models::EaObjectType
  t_statustypes: Lutaml::Qea::Models::EaStatusType
  t_complexitytypes: Lutaml::Qea::Models::EaComplexityType

# Type mappings for SQLite to Ruby
type_mappings:
  INTEGER: integer
  TEXT: string
  REAL: float
  BLOB: binary
  NULL: null

# Boolean conversion rules
boolean_fields:
  # Field names that should be treated as boolean (INTEGER 0/1)
  - IsStatic
  - IsCollection
  - IsOrdered
  - AllowDuplicates
  - IsControlled
  - Protected
  - UseDTD
  - LogXML
  - IsRoot
  - IsLeaf
  - IsSpec
  - IsActive
  - Const
  - Tagged

# Null handling
null_handling:
  strategy: convert_empty_strings
  empty_string_as_null: true
  zero_as_null: false

# Table definitions
